<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Hija del Fuego</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aboreto&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/loader.css">
    <style>
        :root {
            --primary-color: #96353B;
            --bg-color: #faf7f2;
            --text-color: #333;
            --accent-color: #bf9e62;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .reset-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(150, 53, 59, 0.08);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(150, 53, 59, 0.05);
        }

        .reset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .reset-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .reset-header h2 {
            font-family: 'Aboreto', serif;
            color: var(--primary-color);
            font-size: 1.8rem;
            margin: 0 0 12px 0;
            letter-spacing: 1px;
        }

        .reset-header p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 5px 15px rgba(150, 53, 59, 0.05);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(150, 53, 59, 0.2);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #7a2a2f;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(150, 53, 59, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-msg {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-success {
            background: #f0f9f4;
            color: #2d6a4f;
            border: 1px solid #d8f3dc;
        }

        .status-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .logo-small {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <img src="../../../assets/imgStatic/logo-circular.png" alt="Logo" class="logo-small">

            <div class="reset-header">
                <h2>Nueva Clave</h2>
                <p>Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta.</p>
            </div>
            
            <div id="statusMsg" class="status-msg"></div>

            <form id="resetForm">
                <div class="input-group">
                    <label class="input-label">Nueva Contraseña</label>
                    <input type="password" id="password" class="input-field" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="input-group">
                    <label class="input-label">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Repite tu contraseña" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    Actualizar Contraseña
                </button>
            </form>
        </div>
    </div>

    <script src="../../../assets/js/system/constans.js"></script>
    <script>
        const token = window.location.pathname.split('/').pop();
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusMsg = document.getElementById('statusMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            if (password !== confirmPassword) {
                statusMsg.style.display = 'block';
                statusMsg.className = 'status-msg status-error';
                statusMsg.innerHTML = '<i class="fas fa-times-circle"></i> Las contraseñas no coinciden';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';

            try {
                const res = await fetch(`${HOST}${URL_USERS}/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword: password })
                });
                
                const data = await res.json();
                
                statusMsg.style.display = 'block';
                if (res.ok) {
                    statusMsg.className = 'status-msg status-success';
                    statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message + '. Redirigiendo...';
                    setTimeout(() => {
                        window.location.href = '/generalViews/login';
                    }, 3000);
                } else {
                    statusMsg.className = 'status-msg status-error';
                    statusMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (data.error || 'Ocurrió un error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Actualizar Contraseña';
                }
            } catch (err) {
                statusMsg.style.display = 'block';
                statusMsg.className = 'status-msg status-error';
                statusMsg.innerHTML = '<i class="fas fa-wifi"></i> Error de conexión';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Actualizar Contraseña';
            }
        });
    </script>
</body>
</html>
